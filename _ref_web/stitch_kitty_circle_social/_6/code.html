<!DOCTYPE html>

<html lang="zh-CN"><head>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-primary-container/20 selection:text-primary-container">
<!-- Task-Focused Header (Navigation Shell Suppressed) -->
<header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-surface-container-high h-[72px] flex items-center justify-between px-8">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-[24px] group-hover:scale-90 transition-transform">close</span>
</button>
<span class="font-headline-lg text-headline-lg text-on-surface tracking-tight">发布新帖</span>
</div>
<div class="flex items-center gap-4">
<button class="px-6 py-2.5 rounded-full font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors">
                存草稿
            </button>
<button class="bg-gradient-to-b from-[#ff7a91] to-primary-container text-on-primary shadow-[0_4px_20px_rgba(255,90,119,0.25)] px-8 py-2.5 rounded-full font-label-md text-label-md hover:scale-[0.96] transition-transform flex items-center gap-2">
<span>发布</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</header>
<!-- Main Workspace -->
<main class="flex-1 w-full max-w-[1200px] mx-auto p-8">
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full">
<!-- Left Column: Media Upload & Preview -->
<div class="lg:col-span-5 flex flex-col gap-4 h-full">
<div class="bg-surface-container-lowest rounded-lg p-2 shadow-[0_8px_30px_rgba(0,0,0,0.03)] flex flex-col gap-2 relative group h-[600px]">
<!-- Main Preview Area -->
<div class="relative w-full h-full rounded-lg overflow-hidden bg-surface-container-low flex items-center justify-center">
<img alt="Cute fluffy white and orange tabby kitten looking curiously up at the camera, soft natural lighting, high resolution" class="w-full h-full object-cover" data-alt="close-up of a cute fluffy ginger and white kitten looking up with big eyes, soft natural light, warm cream background, highly detailed" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAopPQFfaBhqGMzsaAWtFSoVbtpU4JE3w9xsx2v95TqJM9ZYgb9_ktRcb4ObNpW8kxqzPGKrYG-AQTO4xAQVeF5KYlqBxs-jqL76hJtu-8i4PvuIU7fhGvNsIZfXJwhHKoEFWOU8_jaZuGEEx0wugTaTqCSmxhXY6Nw7mXVBpa4wnRYkbiVVNStYYGnMq6Rl8EBBghP_HjLeXpO2lxZZ3I9iqR5JaCkKlaWyOowJyu5446L7mheN2lPFyVAaSJzAtnTZqjwIQm1"/>
<!-- Image Overlay Controls -->
<div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="w-10 h-10 bg-surface-container-lowest/90 backdrop-blur-md rounded-full flex items-center justify-center text-on-surface hover:text-primary-container transition-colors shadow-sm">
<span class="material-symbols-outlined text-[20px]">crop</span>
</button>
<button class="w-10 h-10 bg-surface-container-lowest/90 backdrop-blur-md rounded-full flex items-center justify-center text-on-surface hover:text-error transition-colors shadow-sm">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
</div>
<!-- Thumbnail Strip -->
<div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
<!-- Active Thumbnail -->
<div class="w-20 h-20 shrink-0 rounded-[16px] overflow-hidden border-2 border-primary-container relative cursor-pointer opacity-100">
<img alt="Thumbnail of kitten" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyFkFthGgKqAx1ROojrC-HRlvWdq4L6gxjXr6p170d5sP6ntqSnCg-ialWC96dxcpVy7obyoJ0m-Hry9y7aRzZfmf7wbDlbuW5iQnYWbfV4MfoBiB95KtxTcjV62VrDwBr8_ZiatKiAnMGeDCx2jnJln3KEPt7Nhvb2Qwv4V78AF59q6YKwKMkIfU7cW6WU8UqpTWrqMJTqTAgmosqFM_Hlz-OUKMpglsvmzNQTP0-CL_N-taKTRELd9CsZpdn3wZxfWiqPdPU"/>
</div>
<!-- Inactive Thumbnail -->
<div class="w-20 h-20 shrink-0 rounded-[16px] overflow-hidden border-2 border-transparent relative cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<img alt="Thumbnail of cat sleeping" class="w-full h-full object-cover" data-alt="a small fluffy cat sleeping curled up on a soft pink cushion, warm cozy lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDU_gCEPqfzP1BlJftgN0DBASzhwdQZB_4GSvYiILDm-lrILAmm47unbw905WkCZpD9OvkkcSxR418mk5wAWw8ooJ90oEYjuh7Ge8G3L3_e_ndIwUiNpWzWq81nmrGyzfKOLysLJ0XzWEyvc4fBcl3p0TgggYlV4dDeof2L1BPo-u5-sGhkG8_iqWodV0iPzhm_WHR5Scm5XP8bkeoyHoxJDx0wzHCD_xTeu_x50hfQ3Wc8cFGzbIwgUvA6bkG_Rp9oIhI_z-L6"/>
</div>
<!-- Add More Button -->
<button class="w-20 h-20 shrink-0 rounded-[16px] border-2 border-dashed border-outline-variant bg-surface-container-low hover:bg-surface-container transition-colors flex flex-col items-center justify-center text-on-surface-variant gap-1">
<span class="material-symbols-outlined text-[24px]">add_photo_alternate</span>
</button>
</div>
</div>
<!-- Right Column: Content Editing -->
<div class="lg:col-span-7 flex flex-col gap-6">
<!-- Title Input -->
<div class="bg-surface-container-lowest rounded-lg p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
<input class="w-full bg-surface-container-low rounded-lg px-6 py-4 font-headline-lg text-headline-lg text-on-surface placeholder:text-outline border-none focus:ring-2 focus:ring-primary-container transition-shadow" placeholder="填写标题会有更多赞哦~" type="text"/>
</div>
<!-- Content Input -->
<div class="bg-surface-container-lowest rounded-lg p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)] flex-1 flex flex-col">
<textarea class="w-full bg-surface-container-low rounded-lg px-6 py-4 font-body-lg text-body-lg text-on-surface placeholder:text-outline border-none focus:ring-2 focus:ring-primary-container transition-shadow flex-1 min-h-[240px] resize-none" placeholder="分享今天的吸猫日常、养宠心得..."></textarea>
<div class="flex items-center justify-between mt-4 text-on-surface-variant font-label-md text-label-md px-2">
<div class="flex gap-4">
<button class="hover:text-primary-container transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[20px]">sentiment_satisfied</span>
                                表情
                            </button>
<button class="hover:text-primary-container transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[20px]">alternate_email</span>
                                提醒谁看
                            </button>
</div>
<span>0 / 1000</span>
</div>
</div>
<!-- Tags & Circle Selection -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Tags -->
<div class="bg-surface-container-lowest rounded-lg p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)] flex flex-col gap-4">
<div class="flex items-center gap-2 text-on-surface font-label-md text-label-md">
<span class="material-symbols-outlined fill text-[20px] text-tertiary-container">tag</span>
                            添加话题标签
                        </div>
<div class="flex flex-wrap gap-2">
<span class="bg-primary-container/10 text-primary-container px-4 py-2 rounded-full font-label-md text-label-md flex items-center gap-1 cursor-pointer hover:bg-primary-container/20 transition-colors">
                                # 幼猫喂养
                                <span class="material-symbols-outlined text-[16px]">close</span>
</span>
<span class="bg-primary-container/10 text-primary-container px-4 py-2 rounded-full font-label-md text-label-md flex items-center gap-1 cursor-pointer hover:bg-primary-container/20 transition-colors">
                                # 猫咪日常
                                <span class="material-symbols-outlined text-[16px]">close</span>
</span>
<button class="border border-dashed border-outline-variant text-on-surface-variant hover:text-primary-container hover:border-primary-container/50 px-4 py-2 rounded-full font-label-md text-label-md flex items-center gap-1 transition-colors">
<span class="material-symbols-outlined text-[18px]">add</span>
                                搜索标签
                            </button>
</div>
</div>
<!-- Circle Selection -->
<div class="bg-surface-container-lowest rounded-lg p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)] flex flex-col gap-4">
<div class="flex items-center gap-2 text-on-surface font-label-md text-label-md">
<span class="material-symbols-outlined fill text-[20px] text-secondary-container">group_work</span>
                            发布到圈子
                        </div>
<button class="w-full bg-surface-container-low hover:bg-surface-container transition-colors rounded-lg px-4 py-3 flex items-center justify-between group">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-gradient-to-br from-tertiary-fixed to-tertiary-container flex items-center justify-center text-on-tertiary shadow-sm">
<span class="material-symbols-outlined fill text-[20px]">pets</span>
</div>
<div class="flex flex-col items-start">
<span class="font-body-lg text-body-lg text-on-surface font-bold">新手铲屎官互助</span>
<span class="font-label-md text-label-md text-outline">公开可见</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary-container transition-colors">chevron_right</span>
</button>
</div>
</div>
</div>
</div>
</main>
</body></html>
