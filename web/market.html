<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="stitch.market_title">市集 · M&D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/tw-stitch.js"></script>
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="/stitch-theme-bridge.css" />
  <link rel="stylesheet" href="/stitch-toast.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 64'%3E%3Crect width='80' height='64' rx='12' fill='%23ff4f93'/%3E%3Ctext x='40' y='40' text-anchor='middle' font-size='24' font-family='Arial' font-weight='700' fill='white'%3EM%26D%3C/text%3E%3C/svg%3E">
  <script src="/shared.js"></script>
  <style>
    body { background: #FFF7EE; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    .material-symbols-outlined.fill { font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
  <nav class="hidden md:flex fixed left-0 top-0 h-full w-64 bg-surface border-r border-surface-container-highest flex-col p-6 gap-4 z-40">
    <div class="mb-6 px-2">
      <a href="/" class="block font-headline-xl text-headline-xl text-primary-container tracking-normal">M&D</a>
      <p class="font-label-md text-label-md text-on-surface-variant mt-1" data-i18n="stitch.tagline">meow & doggie 探索</p>
    </div>
    <div class="flex flex-col gap-2 flex-1">
      <a class="flex items-center gap-3 px-4 py-3 rounded-full text-on-surface-variant hover:bg-surface-container" href="/">
        <span class="material-symbols-outlined">home</span>
        <span class="font-body-lg" data-i18n="stitch.nav_home">首页</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 rounded-full text-on-surface-variant hover:bg-surface-container" href="/discover.html">
        <span class="material-symbols-outlined">explore</span>
        <span class="font-body-lg" data-i18n="stitch.nav_discover">发现</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 rounded-full bg-primary-container/10 text-primary-container font-bold" href="/market.html">
        <span class="material-symbols-outlined fill">shopping_bag</span>
        <span class="font-headline-lg text-headline-lg scale-[0.98] origin-left" data-i18n="stitch.nav_market">市集</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 rounded-full text-on-surface-variant hover:bg-surface-container" href="/#messages">
        <span class="material-symbols-outlined">mail</span>
        <span class="font-body-lg" data-i18n="stitch.nav_messages">消息</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 rounded-full text-on-surface-variant hover:bg-surface-container" href="/profile.html">
        <span class="material-symbols-outlined">person</span>
        <span class="font-body-lg" data-i18n="stitch.nav_me">我的</span>
      </a>
    </div>
    <a href="/compose.html" class="w-full flex items-center justify-center gap-2 bg-gradient-to-b from-primary-container to-[#E04B66] text-white px-6 py-4 rounded-full font-headline-lg shadow-[0_4px_16px_rgba(255,79,147,0.25)] hover:scale-[0.98] transition-transform">
      <span class="material-symbols-outlined text-[20px]">add_circle</span>
      <span data-i18n="nav.compose">发帖</span>
    </a>
  </nav>

  <main class="md:ml-64 min-h-screen">
    <header class="sticky top-0 z-30 w-full flex justify-between items-center px-4 md:px-8 h-16 md:h-20 bg-surface/80 backdrop-blur-xl border-b border-transparent shadow-[0_4px_30px_rgba(0,0,0,0.02)]">
      <div class="flex items-center gap-4">
        <a href="/" class="text-on-surface-variant hover:text-primary-container md:hidden"><span class="material-symbols-outlined">arrow_back</span></a>
        <h1 class="font-headline-xl text-on-surface" data-i18n="stitch.market_heading">好物市集</h1>
      </div>
      <a href="/dashboard#compose-listing" class="hidden sm:inline-flex bg-gradient-to-b from-primary-container to-[#E04B66] text-white px-5 py-2.5 rounded-full font-headline-lg shadow-[0_4px_16px_rgba(255,79,147,0.25)] hover:scale-[0.98] transition-transform" data-i18n="dashboard.nav_compose_listing">发布交易</a>
    </header>

    <div class="p-4 md:p-8 pb-24 max-w-7xl mx-auto w-full">
      <section class="mb-6 rounded-2xl border border-outline-variant/20 bg-surface-container-lowest p-5 shadow-[0_8px_30px_rgba(255,79,147,0.06)]">
        <span class="text-label-md font-bold uppercase text-primary-container">M&D Market</span>
        <h2 class="mt-2 font-headline-xl text-on-surface">猫猫优先的可信好物市集</h2>
        <p class="mt-2 text-body-md text-on-surface-variant" data-i18n="stitch.market_lede">领养、用品、服务——逛一逛同好发布的交易信息。</p>
        <div class="mt-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <label class="relative block md:w-80">
            <span class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
            <input id="market-search" class="w-full rounded-full border border-outline-variant/20 bg-surface-container-low py-2.5 pl-10 pr-4 text-body-md outline-none focus:ring-2 focus:ring-primary-container/30" type="search" placeholder="搜索猫猫好物、服务、领养" />
          </label>
          <div class="flex flex-wrap gap-2" id="market-type-tabs">
            <button class="market-type-chip rounded-full bg-primary-container px-4 py-2 text-label-md font-bold text-white" type="button" data-market-type="all">全部</button>
            <button class="market-type-chip rounded-full bg-surface-container px-4 py-2 text-label-md font-bold text-on-surface-variant" type="button" data-market-type="product">商品</button>
            <button class="market-type-chip rounded-full bg-surface-container px-4 py-2 text-label-md font-bold text-on-surface-variant" type="button" data-market-type="service">服务</button>
            <button class="market-type-chip rounded-full bg-surface-container px-4 py-2 text-label-md font-bold text-on-surface-variant" type="button" data-market-type="adopt">领养</button>
          </div>
        </div>
      </section>
      <div id="listings" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </main>

  <!-- Mobile bottom nav -->
  <div class="md:hidden fixed bottom-0 w-full bg-background/90 backdrop-blur-lg pt-2 pb-safe px-4 flex justify-between items-center z-50 shadow-[0_-4px_20px_rgba(255,90,119,0.05)] rounded-t-[24px] border-t border-white/50">
    <a class="flex flex-col items-center p-2 text-gray-400 hover:text-primary-container" href="/">
      <span class="material-symbols-outlined">home</span>
      <span class="text-[10px] mt-1" data-i18n="stitch.nav_home">首页</span>
    </a>
    <a class="flex flex-col items-center p-2 text-gray-400 hover:text-primary-container" href="/discover.html">
      <span class="material-symbols-outlined">explore</span>
      <span class="text-[10px] mt-1" data-i18n="stitch.nav_discover">发现</span>
    </a>
    <a class="flex flex-col items-center p-2 text-primary-container scale-105" href="/market.html">
      <span class="material-symbols-outlined fill">shopping_bag</span>
      <span class="text-[10px] mt-1 font-semibold" data-i18n="stitch.nav_market">市集</span>
    </a>
    <div class="relative -top-6">
      <a href="/compose.html" class="w-14 h-14 bg-gradient-to-r from-primary-container to-[#ff7e95] rounded-full flex items-center justify-center shadow-lg shadow-primary-container/30 text-white hover:scale-95 transition-transform">
        <span class="material-symbols-outlined text-[32px]">add</span>
      </a>
    </div>
    <a class="flex flex-col items-center p-2 text-gray-400 hover:text-primary-container relative" href="/#messages">
      <span class="material-symbols-outlined">mail</span>
      <span class="text-[10px] mt-1" data-i18n="stitch.nav_messages">消息</span>
    </a>
    <a class="flex flex-col items-center p-2 text-gray-400 hover:text-primary-container" href="/profile.html">
      <span class="material-symbols-outlined">person</span>
      <span class="text-[10px] mt-1" data-i18n="stitch.nav_me">我的</span>
    </a>
  </div>

  <script src="/market.js"></script>
  <script>
    window.MeowShared?.setStitchScreen(window.MeowShared?.STITCH_WEB_SCREENS?.ADMIN_MY_LISTINGS);
  </script>
</body>
</html>
