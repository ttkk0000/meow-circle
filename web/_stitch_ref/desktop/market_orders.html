<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Market & Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame commerce-frame" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Market & Orders</b></div>
      <div class="market-column">
        <h3>市集</h3>
        <article class="listing-row"><img src="https://images.unsplash.com/photo-1583511655826-05700d52f4d9?auto=format&fit=crop&w=700&q=80" alt="" /><div><b>彩色牵引绳套装</b><p>¥69.00 · 可信卖家</p></div></article>
        <article class="listing-row"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?auto=format&fit=crop&w=700&q=80" alt="" /><div><b>上门喂猫</b><p>¥45.00 · 可预约</p></div></article>
      </div>
      <article class="listing-reader">
        <span class="tag">商品</span>
        <h2>彩色牵引绳套装</h2>
        <strong class="price">¥69.00</strong>
        <p>交易决策页在桌面端并排展示详情、卖家信用、订单状态和聊天入口。</p>
        <button>创建订单</button>
      </article>
      <aside class="order-panel">
        <h3>订单状态</h3>
        <ol><li class="done">下单</li><li class="on">支付</li><li>发货</li><li>完成</li></ol>
      </aside>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
