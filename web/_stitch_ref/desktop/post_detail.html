<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Post Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame split-detail" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Post Detail</b></div>
      <div class="split-list">
        <h3>动态列表</h3>
        <article class="row-card on">猫猫第一次学会开门</article>
        <article class="row-card">幼猫晚上一直叫怎么办</article>
        <article class="row-card">周末公园宠物野餐</article>
      </div>
      <article class="reader-panel">
        <img src="https://images.unsplash.com/photo-1543852786-1cf6624b9987?auto=format&fit=crop&w=1100&q=80" alt="" />
        <span class="tag">日常</span>
        <h2>猫猫第一次学会开门，家里从此没有秘密</h2>
        <p>桌面端详情适合左列表右阅读，并保留评论、私信、举报动作。</p>
      </article>
      <aside class="comment-panel"><h3>评论</h3><p>小满：求链接！</p><p>泡芙：它太聪明了。</p></aside>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
