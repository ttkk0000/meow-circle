<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Safety Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame safety-frame" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Safety Operations</b></div>
      <div class="metric-grid"><article><b>128</b><span>帖子</span></article><article><b>31</b><span>评论</span></article><article><b>12</b><span>交易</span></article><article><b>2</b><span>待审核</span></article></div>
      <div class="ops-grid">
        <article><h3>举报处理</h3><p>交易信息描述不完整。</p><span class="tag danger">开放中</span></article>
        <article><h3>媒体审核</h3><p>2 个视频等待人工确认。</p><span class="tag">待审核</span></article>
        <article><h3>审计日志</h3><p>管理员删除评论操作已记录。</p><span class="tag done">已记录</span></article>
      </div>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
