<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Creator Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame studio-frame" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Creator Studio</b></div>
      <article class="editor-panel">
        <h2>发布动态</h2>
        <label>标题<input value="今天第一次带拿铁去公园" /></label>
        <label>内容<textarea>它有点紧张，但看到别的小狗后立刻摇尾巴。</textarea></label>
        <button>发布</button>
      </article>
      <article class="editor-panel">
        <h2>发布交易</h2>
        <label>标题<input value="彩色牵引绳套装" /></label>
        <label>价格<input value="69.00 CNY" /></label>
        <button>发布交易</button>
      </article>
      <aside class="media-panel"><h3>媒体库</h3><div class="media-grid"><span></span><span></span><span></span><span></span></div></aside>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
