<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame message-frame" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Messages</b></div>
      <aside class="inbox-list">
        <h3>消息</h3>
        <article class="row-card on">泡芙小店 <small>地址发你啦</small></article>
        <article class="row-card">城南救助 <small>申请表已收到</small></article>
        <article class="row-card">小满 <small>谢谢！</small></article>
      </aside>
      <article class="chat-desktop">
        <header><h2>泡芙小店</h2><span class="tag done">安全交易</span></header>
        <div class="context-card">彩色牵引绳套装 · ¥69.00</div>
        <p class="bubble in">还在哦，适合 4-8kg。</p>
        <p class="bubble out">可以今晚自提吗？</p>
        <footer>写一条消息...</footer>
      </article>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
