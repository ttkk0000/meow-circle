<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame auth-frame" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Auth</b></div>
      <article class="auth-art"><h2>登录后继续你的 M&D 宇宙</h2><p>桌面端登录页需要明确 return-to、隐私协议 and 错误状态。</p></article>
      <form class="auth-form"><h3>登录</h3><input value="demo" /><input type="password" value="123456" /><button>进入</button></form>
      <form class="auth-form"><h3>注册</h3><input placeholder="昵称" /><input placeholder="手机号" /><button>创建账号</button></form>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
