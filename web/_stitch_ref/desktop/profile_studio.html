<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Profile Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame profile-frame" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Profile Studio</b></div>
      <article class="profile-desktop-hero">
        <div class="profile-glass">
          <span class="avatar-large"></span>
          <div><span class="eyebrow">Me</span><h2>桃子和拿铁</h2><p>@peachlatte · 两只猫的日常记录员</p></div>
        </div>
      </article>
      <aside class="profile-tools">
        <h3>主页背景</h3>
        <div class="chip-row">
          <button class="theme-chip is-active" data-bg-choice="picnic" type="button">Picnic</button>
          <button class="theme-chip" data-bg-choice="desk" type="button">Desk</button>
          <button class="theme-chip" data-bg-choice="arcade" type="button">Arcade</button>
          <button class="theme-chip" data-bg-choice="garden" type="button">Garden</button>
        </div>
      </aside>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
