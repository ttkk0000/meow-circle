<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Notifications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame notification-frame" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Notifications</b></div>
      <article class="notice-row unread"><span class="material-symbols-rounded">chat</span><div><h3>小满评论了你的动态</h3><p>“我家猫也会！”</p></div><time>2 分钟前</time></article>
      <article class="notice-row unread"><span class="material-symbols-rounded">shopping_bag</span><div><h3>订单等待付款</h3><p>彩色牵引绳套装正在等你。</p></div><time>12 分钟前</time></article>
      <article class="notice-row"><span class="material-symbols-rounded">verified_user</span><div><h3>举报已处理</h3><p>管理员已标记解决。</p></div><time>昨天</time></article>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
