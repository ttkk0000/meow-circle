<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Desktop - Home Command</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../pawpop-desktop.css" />
</head>
<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="desktop-frame app-home" style="margin: 0; width: 100%; max-width: 1280px; min-height: 620px;">
    
      <div class="titlebar"><span></span><span></span><span></span><b>Home Command</b></div>
      <aside class="app-sidebar">
        <strong>M&D</strong>
        <nav><span class="on">首页</span><span>发现</span><span>市集</span><span>消息</span><span>我的</span></nav>
      </aside>
      <article class="app-main">
        <div class="hero-wide">
          <div><span class="eyebrow">Dashboard</span><h2>今日 M&D 动态</h2><p>桌面端首页把浏览、搜索、热门话题和任务放到同一屏。</p></div>
          <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=1100&q=80" alt="" />
        </div>
        <div class="desktop-feed">
          <article><img src="https://images.unsplash.com/photo-1543852786-1cf6624b9987?auto=format&fit=crop&w=700&q=80" alt="" /><b>猫猫第一次学会开门</b><p>128 喜欢 · 24 评论</p></article>
          <article><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?auto=format&fit=crop&w=700&q=80" alt="" /><b>周末宠物野餐</b><p>活动 · 同城</p></article>
        </div>
      </article>
      <aside class="app-rail"><h3>右侧效率栏</h3><p>照护提醒、热门话题、安全提示。</p></aside>
    
  </section>
  <script src="../../pawpop-desktop.js" defer></script>
</body>
</html>
