<!doctype html>
<html lang="zh-CN" data-theme="sugar" data-profile-bg="picnic">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&D Mobile - Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">

<body style="margin: 0; padding: 20px; background: #fff7ee; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <section class="phone-screen" style="margin: 0;">
    <div class="phone">
        <div class="phone-status"><span>9:41</span><span>消息</span></div>
        <article class="screen">
          <div class="mobile-top"><div><span class="eyebrow">Messages</span><h2>私信</h2></div></div>
          <div class="conversation"><span class="avatar-dot"></span><div><b>泡芙小店</b><p>地址发你啦，晚上见。</p></div><i>2</i></div>
          <div class="conversation"><span class="avatar-dot blue"></span><div><b>城南救助</b><p>领养申请表已收到。</p></div><i>1</i></div>
          <div class="chat-preview"><p class="in">还在哦，适合 4-8kg。</p><p class="out">可以今晚自提吗？</p></div>
        </article>
      </div>
  </section>
  <script src="../../pawpop-mobile.js" defer></script>
</body>
</html>
