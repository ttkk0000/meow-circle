<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="stitch.profile_title">我的 · 喵友圈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/tw-stitch.js"></script>
  <link rel="stylesheet" href="/stitch-toast.css" />
  <script src="/shared.js"></script>
  <style>
    body { background: #f9f7f2; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    .masonry-grid { column-count: 1; column-gap: 12px; }
    @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
    @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
    .masonry-item { break-inside: avoid; margin-bottom: 12px; }
  </style>
</head>
<body class="font-body-md text-on-background min-h-screen pb-24 md:pb-8">
  <header class="hidden md:flex fixed top-0 w-full justify-between items-center px-8 h-16 bg-[#F9F7F2]/80 backdrop-blur-xl border-b border-[#FF5A77]/10 z-50">
    <div class="flex items-center gap-8">
      <a href="/" class="text-2xl font-black text-[#FF5A77] tracking-tighter">Kitty Circle</a>
      <nav class="flex gap-6 text-body-lg">
        <a class="text-gray-500 hover:text-[#FF5A77]" href="/discover.html" data-i18n="stitch.nav_discover">发现</a>
        <a class="text-[#FF5A77] border-b-2 border-[#FF5A77] pb-1" href="/profile.html" data-i18n="stitch.nav_me">我的</a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <a href="/compose.html" class="flex items-center gap-2 bg-gradient-to-r from-primary-container to-primary text-on-primary rounded-full px-4 py-2 font-label-md shadow-md" data-i18n="nav.compose">发帖</a>
      <a href="/dashboard" class="text-label-md text-gray-500" data-i18n="nav.dashboard">管理</a>
    </div>
  </header>

  <main class="md:pt-16 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <section class="mt-4 md:mt-8 mb-10 rounded-[32px] bg-white overflow-hidden shadow-[0_8px_30px_rgba(255,90,119,0.04)] relative border border-gray-100">
      <div class="h-48 sm:h-64 w-full bg-gradient-to-br from-primary-container/30 to-tertiary-container/20 relative flex items-center justify-center text-6xl" id="profile-cover">🐾</div>
      <div class="px-6 md:px-8 pb-8 relative -mt-12 flex flex-col items-center">
        <div class="w-28 h-28 rounded-full border-4 border-white overflow-hidden shadow-lg mb-4 bg-surface-container-low flex items-center justify-center text-3xl font-bold text-primary-container" id="profile-avatar">?</div>
        <h1 class="font-headline-xl text-on-surface mb-2 text-center" id="profile-name">—</h1>
        <p class="font-body-md text-on-surface-variant text-center max-w-md mb-6" id="profile-bio"></p>
        <div class="flex gap-8 mb-6 font-body-md text-center">
          <div><span class="font-headline-lg text-on-surface block" id="stat-posts">0</span><span class="text-on-surface-variant" data-i18n="section.latest_posts">帖子</span></div>
          <div><span class="font-headline-lg text-on-surface block">—</span><span class="text-on-surface-variant">粉丝</span></div>
        </div>
        <div class="flex gap-4 flex-wrap justify-center">
          <a href="/dashboard#profile" class="bg-surface-container-high text-on-surface hover:bg-surface-dim px-6 py-2 rounded-full font-label-md transition-colors" data-i18n="stitch.profile_edit">编辑资料</a>
          <button type="button" id="btn-share" class="bg-primary-container text-on-primary hover:bg-primary px-6 py-2 rounded-full font-label-md flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">share</span>
            <span data-i18n="stitch.profile_share">分享主页</span>
          </button>
        </div>
      </div>
    </section>

    <p id="guest-hint" class="hidden text-center text-on-surface-variant mb-6" data-i18n="dashboard.not_login_tip">请先登录</p>
    <a id="guest-login" href="/login?return_to=%2Fprofile.html" class="hidden mx-auto block w-fit bg-primary-container text-white px-6 py-3 rounded-full font-label-md mb-8" data-i18n="nav.login">登录</a>

    <section class="masonry-grid" id="my-posts"></section>
  </main>
  <script src="/profile.js"></script>
</body>
</html>
