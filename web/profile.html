<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="stitch.profile_title">我的 · M&D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/tw-stitch.js?v=2"></script>
  <link rel="stylesheet" href="/theme.css?v=2" />
  <link rel="stylesheet" href="/stitch-theme-bridge.css?v=2" />
  <link rel="stylesheet" href="/stitch-toast.css?v=2" />
  <script src="/shared.js?v=2"></script>
  <style>
    body { background: #FFF7EE; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    .material-symbols-outlined.fill { font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24; }
    .masonry-grid { column-count: 1; column-gap: 12px; }
    @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
    @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
    .masonry-item { break-inside: avoid; margin-bottom: 12px; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
  <nav class="hidden md:flex fixed left-0 top-0 h-full w-64 bg-surface border-r border-surface-container-highest flex-col p-6 gap-4 z-40">
    <div class="mb-6 px-2">
      <a href="/" class="block font-headline-xl text-headline-xl text-primary-container tracking-normal">M&D</a>
      <p class="font-label-md text-label-md text-on-surface-variant mt-1" data-i18n="stitch.tagline">meow & doggie 探索</p>
    </div>
    <div class="flex flex-col gap-2 flex-1">
      <a class="flex items-center gap-3 px-4 py-3 rounded-full text-on-surface-variant hover:bg-surface-container" href="/">
        <span class="material-symbols-outlined">home</span>
        <span class="font-body-lg" data-i18n="stitch.nav_home">首页</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 rounded-full text-on-surface-variant hover:bg-surface-container" href="/discover.html">
        <span class="material-symbols-outlined">explore</span>
        <span class="font-body-lg" data-i18n="stitch.nav_discover">发现</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 rounded-full text-on-surface-variant hover:bg-surface-container" href="/market.html">
        <span class="material-symbols-outlined">shopping_bag</span>
        <span class="font-body-lg" data-i18n="stitch.nav_market">市集</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 rounded-full text-on-surface-variant hover:bg-surface-container" href="/#messages">
        <span class="material-symbols-outlined">mail</span>
        <span class="font-body-lg" data-i18n="stitch.nav_messages">消息</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 rounded-full bg-primary-container/10 text-primary-container font-bold" href="/profile.html">
        <span class="material-symbols-outlined fill">person</span>
        <span class="font-headline-lg text-headline-lg scale-[0.98] origin-left" data-i18n="stitch.nav_me">我的</span>
      </a>
    </div>
    <a href="/compose.html" class="w-full flex items-center justify-center gap-2 bg-gradient-to-b from-primary-container to-[#E04B66] text-white px-6 py-4 rounded-full font-headline-lg shadow-[0_4px_16px_rgba(255,79,147,0.25)] hover:scale-[0.98] transition-transform">
      <span class="material-symbols-outlined text-[20px]">add_circle</span>
      <span data-i18n="nav.compose">发帖</span>
    </a>
  </nav>

  <main class="md:ml-64 min-h-screen">
    <header class="sticky top-0 z-30 w-full flex justify-between items-center px-4 md:px-8 h-16 md:h-20 bg-surface/80 backdrop-blur-xl border-b border-transparent shadow-[0_4px_30px_rgba(0,0,0,0.02)]">
      <div class="flex items-center gap-4">
        <a href="/" class="text-on-surface-variant hover:text-primary-container md:hidden"><span class="material-symbols-outlined">arrow_back</span></a>
        <h1 class="font-headline-xl text-on-surface" data-i18n="stitch.profile_title">我的 M&D</h1>
      </div>
      <div class="flex items-center gap-3">
        <a href="/dashboard" class="inline-flex bg-surface-container-high hover:bg-surface-dim px-5 py-2.5 rounded-full font-headline-lg hover:scale-[0.98] transition-transform text-on-surface" data-i18n="nav.dashboard">管理面板</a>
      </div>
    </header>

    <div class="p-4 md:p-8 pb-24 max-w-7xl mx-auto w-full">
      <section class="mb-10 rounded-xl bg-white overflow-hidden shadow-[0_8px_30px_rgba(255,79,147,0.04)] relative border border-gray-100">
        <div class="h-48 sm:h-64 w-full bg-gradient-to-br from-primary-container/30 to-tertiary-container/20 relative flex items-center justify-center text-6xl" id="profile-cover"></div>
        <div class="px-6 md:px-8 pb-8 relative -mt-12 flex flex-col items-center">
          <div class="w-28 h-28 rounded-full border-4 border-white overflow-hidden shadow-lg mb-4 bg-surface-container-low flex items-center justify-center text-3xl font-bold text-primary-container" id="profile-avatar">?</div>
          <h1 class="font-headline-xl text-on-surface mb-2 text-center" id="profile-name">—</h1>
          <p class="font-body-md text-on-surface-variant text-center max-w-md mb-6" id="profile-bio"></p>
          <div class="flex gap-8 mb-6 font-body-md text-center">
            <div><span class="font-headline-lg text-on-surface block" id="stat-posts">0</span><span class="text-on-surface-variant" data-i18n="section.latest_posts">帖子</span></div>
            <div><span class="font-headline-lg text-on-surface block">—</span><span class="text-on-surface-variant">粉丝</span></div>
          </div>
          <div class="flex gap-4 flex-wrap justify-center">
            <button type="button" id="btn-edit-profile" class="bg-surface-container-high text-on-surface hover:bg-surface-dim px-6 py-2 rounded-full font-label-md transition-colors" data-i18n="stitch.profile_edit">编辑资料</button>
            <button type="button" id="btn-share" class="bg-primary-container text-on-primary hover:bg-primary px-6 py-2 rounded-full font-label-md flex items-center gap-2">
              <span class="material-symbols-outlined text-[18px]">share</span>
              <span data-i18n="stitch.profile_share">分享主页</span>
            </button>
          </div>
          <div class="mt-5 flex flex-wrap justify-center gap-2" id="profile-bg-picks" aria-label="M&D 主页背景">
            <button type="button" class="profile-bg-chip rounded-full bg-primary-container px-3 py-1.5 text-label-md font-bold text-white" data-profile-bg="picnic">Picnic</button>
            <button type="button" class="profile-bg-chip rounded-full bg-surface-container px-3 py-1.5 text-label-md font-bold text-on-surface-variant" data-profile-bg="desk">Desk</button>
            <button type="button" class="profile-bg-chip rounded-full bg-surface-container px-3 py-1.5 text-label-md font-bold text-on-surface-variant" data-profile-bg="arcade">Arcade</button>
            <button type="button" class="profile-bg-chip rounded-full bg-surface-container px-3 py-1.5 text-label-md font-bold text-on-surface-variant" data-profile-bg="garden">Garden</button>
          </div>
        </div>
      </section>

      <p id="guest-hint" class="hidden text-center text-on-surface-variant mb-6" data-i18n="dashboard.not_login_tip">请先登录</p>
      <a id="guest-login" href="/login?return_to=%2Fprofile.html" class="hidden mx-auto block w-fit bg-primary-container text-white px-6 py-3 rounded-full font-label-md mb-8" data-i18n="nav.login">登录</a>

      <section class="masonry-grid" id="my-posts"></section>
    </div>
  </main>

  <section id="profile-edit-modal" class="hidden fixed inset-0 z-50 bg-black/30 backdrop-blur-[2px] p-4">
    <div class="max-w-lg mx-auto mt-10 rounded-xl bg-white border border-gray-100 shadow-[0_16px_48px_rgba(255,79,147,0.18)] p-5">
      <h3 class="text-headline-lg font-headline-lg mb-4" data-i18n="profile.stitch_title">资料与偏好</h3>
      <form id="profile-edit-form" class="space-y-3">
        <input name="nickname" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-low px-3 py-2.5" data-i18n-placeholder="profile.nickname" required />
        <input name="avatar_url" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-low px-3 py-2.5" data-i18n-placeholder="profile.avatar_url" />
        <textarea name="bio" rows="4" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-low px-3 py-2.5" data-i18n-placeholder="profile.bio"></textarea>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="btn-edit-cancel" class="rounded-full px-4 py-2 bg-surface-container text-on-surface-variant" data-i18n="profile.btn_cancel">取消</button>
          <button type="submit" class="rounded-full px-5 py-2 bg-primary-container text-white" data-i18n="profile.btn_save">保存资料</button>
        </div>
      </form>
    </div>
  </section>

  <!-- Mobile bottom nav -->
  <div class="md:hidden fixed bottom-0 w-full bg-background/90 backdrop-blur-lg pt-2 pb-safe px-4 flex justify-between items-center z-50 shadow-[0_-4px_20px_rgba(255,90,119,0.05)] rounded-t-[24px] border-t border-white/50">
    <a class="flex flex-col items-center p-2 text-gray-400 hover:text-primary-container" href="/">
      <span class="material-symbols-outlined">home</span>
      <span class="text-[10px] mt-1" data-i18n="stitch.nav_home">首页</span>
    </a>
    <a class="flex flex-col items-center p-2 text-gray-400 hover:text-primary-container" href="/discover.html">
      <span class="material-symbols-outlined">explore</span>
      <span class="text-[10px] mt-1" data-i18n="stitch.nav_discover">发现</span>
    </a>
    <a class="flex flex-col items-center p-2 text-gray-400 hover:text-primary-container" href="/market.html">
      <span class="material-symbols-outlined">shopping_bag</span>
      <span class="text-[10px] mt-1" data-i18n="stitch.nav_market">市集</span>
    </a>
    <div class="relative -top-6">
      <a href="/compose.html" class="w-14 h-14 bg-gradient-to-r from-primary-container to-[#ff7e95] rounded-full flex items-center justify-center shadow-lg shadow-primary-container/30 text-white hover:scale-95 transition-transform">
        <span class="material-symbols-outlined text-[32px]">add</span>
      </a>
    </div>
    <a class="flex flex-col items-center p-2 text-gray-400 hover:text-primary-container relative" href="/#messages">
      <span class="material-symbols-outlined">mail</span>
      <span class="text-[10px] mt-1" data-i18n="stitch.nav_messages">消息</span>
    </a>
    <a class="flex flex-col items-center p-2 text-primary-container scale-105" href="/profile.html">
      <span class="material-symbols-outlined fill">person</span>
      <span class="text-[10px] mt-1 font-semibold" data-i18n="stitch.nav_me">我的</span>
    </a>
  </div>

  <script src="/profile.js"></script>
  <script>
    window.MeowShared?.setStitchScreen(window.MeowShared?.STITCH_WEB_SCREENS?.PROFILE_DESKTOP);
  </script>
</body>
</html>
