<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pawpop 三套 UI 总览</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #fff7ee;
      color: #2b1722;
      font-family: "Noto Sans SC", "Fredoka", system-ui, sans-serif;
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }
    h1, h2 { margin: 0; font-family: "Fredoka", "Noto Sans SC", system-ui, sans-serif; letter-spacing: 0; }
    h1 { font-size: clamp(2.6rem, 7vw, 5.4rem); line-height: .95; }
    p { color: #7d6170; line-height: 1.7; }
    .hero {
      display: grid;
      gap: 16px;
      margin-bottom: 26px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    a {
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      border: 1px solid rgba(43, 23, 34, .14);
      border-radius: 12px;
      background: #fff;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 18px 44px rgba(92, 47, 75, .13);
    }
    a:hover { transform: translateY(-2px); }
    span {
      display: inline-flex;
      width: fit-content;
      min-height: 30px;
      align-items: center;
      padding: 0 10px;
      border-radius: 999px;
      background: #fff0f6;
      color: #ff4f93;
      font-weight: 800;
    }
    .mobile { background: linear-gradient(180deg, #fff, #fff0f6); }
    .desktop { background: linear-gradient(180deg, #fff, #effff8); }
    .webui { background: linear-gradient(180deg, #fff, #fff7d8); }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      a { min-height: 220px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <span>Pawpop UI Trilogy</span>
      <h1>三套独立 UI 设计</h1>
      <p>手机端、桌面端、WebUI 各自独立，不再用一套响应式设计硬套所有平台。三套都保留可爱风、主题切换和完整功能页面。</p>
    </section>
    <section class="grid">
      <a class="mobile" href="pawpop-mobile.html">
        <span>Mobile</span>
        <div>
          <h2>手机端</h2>
          <p>以 App 使用习惯设计，12 个手机页面：登录、首页、详情、发现、市集、交易详情、消息、通知、我的、创作、订单、安全。</p>
        </div>
      </a>
      <a class="desktop" href="pawpop-desktop.html">
        <span>Desktop</span>
        <div>
          <h2>桌面端</h2>
          <p>以桌面客户端/效率工作台设计，强调并排阅读、交易决策、创作管理和审核操作。</p>
        </div>
      </a>
      <a class="webui" href="cute.html">
        <span>WebUI</span>
        <div>
          <h2>WebUI</h2>
          <p>浏览器 Web 产品入口，左 dock + 中央舞台 + 右侧信息栏，适合正式 Web 页面落地。</p>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
