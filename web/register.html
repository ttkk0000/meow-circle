<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="auth.register_title">注册 · 喵友圈</title>
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="/styles.css" />
  <script src="/shared.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="meow-logo">
        <span class="logo-mark" aria-hidden="true">🐾</span>
        <span data-i18n="app.title">喵友圈</span>
      </a>
      <nav class="nav-links">
        <div id="settings-bar"></div>
        <a href="/architecture.html" data-i18n="nav.docs">系统文档</a>
        <a href="/login" class="cta-link" data-i18n="nav.login">登录</a>
      </nav>
    </div>
  </header>

  <main class="auth-shell">
    <section class="auth-card">
      <h1 data-i18n="auth.register_heading">创建你的账号</h1>
      <p class="lede" data-i18n="auth.register_lede">几秒完成注册，立即发帖、发布交易、收发私信。</p>

      <form id="register-form" class="form-grid" autocomplete="on" novalidate>
        <div class="field-group">
          <label for="reg-username" data-i18n="auth.label_username">用户名</label>
          <input
            id="reg-username"
            name="username"
            type="text"
            autocomplete="username"
            required
            minlength="3"
            pattern="[A-Za-z0-9_]{3,}"
            data-i18n-placeholder="auth.placeholder_username_reg"
            placeholder="3 位以上，字母/数字/下划线" />
          <p class="caption" data-i18n="auth.hint_username">3 位以上，支持字母、数字、下划线</p>
        </div>

        <div class="field-group">
          <label for="reg-nickname" data-i18n="auth.label_nickname">昵称</label>
          <input
            id="reg-nickname"
            name="nickname"
            type="text"
            autocomplete="nickname"
            maxlength="32"
            data-i18n-placeholder="auth.placeholder_nickname"
            placeholder="将展示给其他用户" />
        </div>

        <div class="field-group">
          <label for="reg-password" data-i18n="auth.label_password">密码</label>
          <input
            id="reg-password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
            minlength="6"
            data-i18n-placeholder="auth.placeholder_password_reg"
            placeholder="至少 6 位" />
          <p class="caption" data-i18n="auth.hint_password">至少 6 位，建议包含字母和数字</p>
        </div>

        <div class="submit-row">
          <button class="btn-primary" type="submit" data-i18n="auth.btn_register">注册</button>
        </div>
        <p id="register-error" class="auth-error" role="alert"></p>
      </form>

      <p class="auth-alt-link">
        <span data-i18n="auth.have_account">已经有账号？</span>
        <a href="/login" data-i18n="auth.go_login">返回登录</a>
      </p>
    </section>
  </main>

  <script src="/auth.js"></script>
</body>
</html>
