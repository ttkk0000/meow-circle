<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="stitch.compose_title">发布新帖 · M&D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/tw-stitch.js"></script>
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="/stitch-theme-bridge.css" />
  <link rel="stylesheet" href="/stitch-toast.css" />
  <script src="/shared.js"></script>
  <style>
    body { background: #fbf9f4; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
  </style>
</head>
<body class="font-body-md text-on-background min-h-screen flex flex-col antialiased">
  <header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-surface-container-high h-[72px] flex items-center justify-between px-4 md:px-8">
    <div class="flex items-center gap-4">
      <a href="/" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors" aria-label="关闭">
        <span class="material-symbols-outlined text-[24px]">close</span>
      </a>
      <span class="font-headline-lg text-on-surface tracking-tight" data-i18n="stitch.compose_heading">M&D 发布台</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="settings-bar" class="hidden sm:flex"></div>
      <button type="submit" form="compose-form" class="bg-gradient-to-b from-[#FF8A3D] to-primary-container text-on-primary shadow-[0_4px_20px_rgba(255,138,61,0.25)] px-6 py-2.5 rounded-full font-label-md hover:scale-[0.96] transition-transform flex items-center gap-2">
        <span data-i18n="form.btn_publish_post">发布</span>
        <span class="material-symbols-outlined text-[18px]">send</span>
      </button>
    </div>
  </header>
  <main class="flex-1 w-full max-w-[1080px] mx-auto p-4 md:p-8">
    <section class="mnd-page-hero mb-6 overflow-hidden">
      <div class="grid gap-0 lg:grid-cols-[1fr_0.8fr]">
        <div class="p-5 md:p-7">
          <p class="mnd-eyebrow">Compose · M&D</p>
          <h1 class="mt-2 font-headline-xl text-headline-xl text-on-surface" data-i18n="stitch.compose_hero_title">写给猫猫宇宙的一条新动态</h1>
          <p class="mt-3 text-body-lg text-on-surface-variant" data-i18n="stitch.compose_hero_sub">默认服务猫猫日常、求助、健康和活动，doggie 家庭也能自然参与。保持标题清楚，图片可稍后关联媒体 ID。</p>
          <div class="mt-5 grid gap-3 sm:grid-cols-3">
            <div class="mnd-chip px-4 py-3"><span class="material-symbols-outlined align-middle text-[18px]">pets</span> cat-first</div>
            <div class="mnd-chip px-4 py-3"><span class="material-symbols-outlined align-middle text-[18px]">verified</span> friendly</div>
            <div class="mnd-chip px-4 py-3"><span class="material-symbols-outlined align-middle text-[18px]">palette</span> theme-ready</div>
          </div>
        </div>
        <img class="hidden h-full min-h-[260px] w-full object-cover lg:block" alt="" src="assets/stitch-remote/screens/5e8d58afba4142068ea51010b1e17e3a.png" />
      </div>
    </section>
    <form id="compose-form" class="flex flex-col gap-6">
      <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
        <label class="block text-label-md font-semibold text-on-surface-variant mb-2" data-i18n="form.title">标题</label>
        <input name="title" required class="w-full bg-surface-container-low rounded-2xl px-5 py-4 font-headline-lg text-on-surface placeholder:text-outline border-none focus:ring-2 focus:ring-primary-container outline-none" data-i18n-placeholder="stitch.compose_title_hint" placeholder="今天想记录哪一刻？" />
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
        <label class="block text-label-md font-semibold text-on-surface-variant mb-2" data-i18n="form.content_label">正文</label>
        <textarea name="content" required rows="8" class="w-full bg-surface-container-low rounded-2xl px-5 py-4 font-body-lg text-on-surface placeholder:text-outline border-none focus:ring-2 focus:ring-primary-container outline-none resize-y min-h-[200px]" data-i18n-placeholder="form.content" placeholder="写下猫猫日常、求助、活动，doggie 也可以出镜。"></textarea>
      </div>
      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
          <label class="block text-label-md font-semibold text-on-surface-variant mb-2" data-i18n="stitch.compose_category">分类</label>
          <select name="category" class="w-full rounded-2xl bg-surface-container-low border-none py-3 px-4 focus:ring-2 focus:ring-primary-container">
            <option value="daily_share" data-i18n="form.category_daily">日常分享</option>
            <option value="help" data-i18n="form.category_help">求助问答</option>
            <option value="activity" data-i18n="form.category_activity">线下活动</option>
            <option value="trade" data-i18n="form.category_trade">交易信息</option>
          </select>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
          <label class="block text-label-md font-semibold text-on-surface-variant mb-2" data-i18n="form.tags">标签</label>
          <input name="tags" class="w-full rounded-2xl bg-surface-container-low border-none py-3 px-4 focus:ring-2 focus:ring-primary-container" data-i18n-placeholder="form.tags" placeholder="逗号分隔" />
        </div>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
        <label class="block text-label-md font-semibold text-on-surface-variant mb-2" data-i18n="media.attach_hint">媒体 ID</label>
        <input id="compose-media-ids" name="media_ids" class="w-full rounded-2xl bg-surface-container-low border-none py-3 px-4 focus:ring-2 focus:ring-primary-container" placeholder="1,2,3" />
        <div class="mt-3 flex flex-wrap gap-2">
          <label class="inline-flex items-center gap-2 rounded-full bg-primary-container/10 text-primary-container px-4 py-2 font-label-md cursor-pointer hover:bg-primary-container/20">
            <span class="material-symbols-outlined text-[18px]">upload</span>
            <span data-i18n="media.upload_image">上传图片</span>
            <input id="compose-upload-image" type="file" accept="image/*" class="hidden" />
          </label>
          <label class="inline-flex items-center gap-2 rounded-full bg-primary-container/10 text-primary-container px-4 py-2 font-label-md cursor-pointer hover:bg-primary-container/20">
            <span class="material-symbols-outlined text-[18px]">videocam</span>
            <span data-i18n="media.upload_video">上传视频</span>
            <input id="compose-upload-video" type="file" accept="video/mp4,video/webm,video/quicktime" class="hidden" />
          </label>
          <button type="button" id="compose-save-draft" class="inline-flex items-center gap-2 rounded-full bg-surface-container text-on-surface-variant px-4 py-2 font-label-md hover:bg-surface-dim" data-i18n="form.save_draft">存草稿</button>
        </div>
        <p id="compose-media-picked" class="mt-2 text-label-md text-on-surface-variant"></p>
      </div>
    </form>
  </main>
  <script src="/compose.js"></script>
  <script>
    window.MeowShared?.setStitchScreen(window.MeowShared?.STITCH_WEB_SCREENS?.COMPOSE_POST_DESKTOP);
  </script>
</body>
</html>
