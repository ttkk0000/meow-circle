<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="stitch.compose_title">发布新帖 · 喵友圈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/tw-stitch.js"></script>
  <link rel="stylesheet" href="/stitch-toast.css" />
  <script src="/shared.js"></script>
  <style>
    body { background: #fbf9f4; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
  </style>
</head>
<body class="font-body-md text-on-background min-h-screen flex flex-col antialiased">
  <header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-surface-container-high h-[72px] flex items-center justify-between px-4 md:px-8">
    <div class="flex items-center gap-4">
      <a href="/" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors" aria-label="关闭">
        <span class="material-symbols-outlined text-[24px]">close</span>
      </a>
      <span class="font-headline-lg text-on-surface tracking-tight" data-i18n="stitch.compose_heading">发布新帖</span>
    </div>
    <button type="submit" form="compose-form" class="bg-gradient-to-b from-[#ff7a91] to-primary-container text-on-primary shadow-[0_4px_20px_rgba(255,90,119,0.25)] px-6 py-2.5 rounded-full font-label-md hover:scale-[0.96] transition-transform flex items-center gap-2">
      <span data-i18n="form.btn_publish_post">发布</span>
      <span class="material-symbols-outlined text-[18px]">send</span>
    </button>
  </header>
  <main class="flex-1 w-full max-w-[900px] mx-auto p-4 md:p-8">
    <form id="compose-form" class="flex flex-col gap-6">
      <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
        <input name="title" required class="w-full bg-surface-container-low rounded-2xl px-5 py-4 font-headline-lg text-on-surface placeholder:text-outline border-none focus:ring-2 focus:ring-primary-container outline-none" data-i18n-placeholder="stitch.compose_title_hint" placeholder="填写标题会有更多赞哦~" />
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
        <textarea name="content" required rows="8" class="w-full bg-surface-container-low rounded-2xl px-5 py-4 font-body-lg text-on-surface placeholder:text-outline border-none focus:ring-2 focus:ring-primary-container outline-none resize-y min-h-[200px]" data-i18n-placeholder="form.content" placeholder="分享今天的吸猫日常..."></textarea>
      </div>
      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
          <label class="block text-label-md font-semibold text-on-surface-variant mb-2" data-i18n="stitch.compose_category">分类</label>
          <select name="category" class="w-full rounded-2xl bg-surface-container-low border-none py-3 px-4 focus:ring-2 focus:ring-primary-container">
            <option value="daily_share" data-i18n="form.category_daily">日常分享</option>
            <option value="help" data-i18n="form.category_help">求助问答</option>
            <option value="activity" data-i18n="form.category_activity">线下活动</option>
            <option value="trade" data-i18n="form.category_trade">交易信息</option>
          </select>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
          <label class="block text-label-md font-semibold text-on-surface-variant mb-2" data-i18n="form.tags">标签</label>
          <input name="tags" class="w-full rounded-2xl bg-surface-container-low border-none py-3 px-4 focus:ring-2 focus:ring-primary-container" data-i18n-placeholder="form.tags" placeholder="逗号分隔" />
        </div>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.03)]">
        <label class="block text-label-md font-semibold text-on-surface-variant mb-2" data-i18n="media.attach_hint">媒体 ID</label>
        <input name="media_ids" class="w-full rounded-2xl bg-surface-container-low border-none py-3 px-4 focus:ring-2 focus:ring-primary-container" placeholder="1,2,3" />
      </div>
    </form>
  </main>
  <script src="/compose.js"></script>
</body>
</html>
