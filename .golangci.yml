version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - misspell
    - unconvert
  settings:
    misspell:
      locale: US
      ignore-rules:
        # British English spelling used as an enum value stored in DB and
        # surfaced in the i18n dictionary; changing it would be a breaking
        # change, so keep it as-is.
        - cancelled
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
