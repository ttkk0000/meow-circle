services:
  postgres:
    image: postgres:16-alpine
    container_name: meow-postgres
    environment:
      POSTGRES_USER: meow
      POSTGRES_PASSWORD: meowpass
      POSTGRES_DB: meow
    ports:
      - "5432:5432"
    volumes:
      - meow_pg:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meow -d meow"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: meow-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - meow_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  meow_pg:
  meow_redis:
