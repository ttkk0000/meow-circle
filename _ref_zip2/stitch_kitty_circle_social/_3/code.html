<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>注册 - Kitty Circle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#00513f",
                        "surface": "#fbf9f4",
                        "secondary-container": "#fdaf18",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#e1bec0",
                        "primary": "#b52044",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#75f9d1",
                        "on-surface-variant": "#594042",
                        "on-error": "#ffffff",
                        "inverse-primary": "#ffb2b9",
                        "on-primary": "#ffffff",
                        "surface-bright": "#fbf9f4",
                        "on-secondary-fixed-variant": "#614000",
                        "inverse-surface": "#30312e",
                        "secondary-fixed": "#ffddb0",
                        "tertiary-fixed-dim": "#55dcb6",
                        "surface-container-low": "#f5f3ee",
                        "outline": "#8d7072",
                        "on-surface": "#1b1c19",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e2dd",
                        "secondary": "#805600",
                        "on-secondary-fixed": "#281800",
                        "background": "#fbf9f4",
                        "error": "#ba1a1a",
                        "on-background": "#1b1c19",
                        "primary-fixed": "#ffdadc",
                        "surface-variant": "#e4e2dd",
                        "surface-tint": "#b52044",
                        "surface-container-high": "#eae8e3",
                        "on-primary-fixed": "#400010",
                        "surface-container": "#f0eee9",
                        "on-tertiary-container": "#003528",
                        "inverse-on-surface": "#f2f1ec",
                        "secondary-fixed-dim": "#ffba46",
                        "tertiary-container": "#00a986",
                        "on-secondary-container": "#694600",
                        "on-primary-fixed-variant": "#91002f",
                        "on-primary-container": "#62001d",
                        "tertiary": "#006b54",
                        "on-tertiary-fixed": "#002118",
                        "surface-dim": "#dbdad5",
                        "primary-fixed-dim": "#ffb2b9",
                        "primary-container": "#ff5a77",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "sm": "12px",
                        "card-gap": "12px",
                        "base": "4px",
                        "xl": "32px",
                        "lg": "24px",
                        "container-padding": "16px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-xl": ["28px", { "lineHeight": "36px", "fontWeight": "800" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "headline-lg": ["22px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .squish:active {
            transform: scale(0.96);
            transition: transform 0.15s ease-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col items-center justify-start text-on-surface">
<div class="w-full max-w-md min-h-screen flex flex-col relative px-md py-xl">
<header class="w-full flex items-center justify-between mb-xl">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface squish">
<span class="material-symbols-outlined font-[300]">arrow_back</span>
</button>
<div class="text-primary-container font-headline-xl text-headline-xl tracking-tighter drop-shadow-sm">MEOW</div>
<div class="w-10 h-10"></div>
</header>
<main class="flex-1 flex flex-col w-full z-10 relative">
<div class="mb-lg">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-base">创建账号</h1>
<p class="font-body-md text-body-md text-on-surface-variant">加入 Kitty Circle，分享主子的日常</p>
</div>
<form class="flex flex-col gap-sm w-full">
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline font-[300]">person</span>
</div>
<input class="w-full h-14 pl-12 pr-sm bg-surface-container-low rounded-lg border-transparent focus:border-primary-container focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline transition-colors outline-none" placeholder="用户名" type="text"/>
</div>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline font-[300]">phone_iphone</span>
</div>
<input class="w-full h-14 pl-12 pr-sm bg-surface-container-low rounded-lg border-transparent focus:border-primary-container focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline transition-colors outline-none" placeholder="手机号码" type="tel"/>
</div>
<div class="relative w-full flex gap-sm">
<div class="relative flex-1">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline font-[300]">mark_email_read</span>
</div>
<input class="w-full h-14 pl-12 pr-sm bg-surface-container-low rounded-lg border-transparent focus:border-primary-container focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline transition-colors outline-none" placeholder="验证码" type="text"/>
</div>
<button class="h-14 px-md bg-secondary-container/10 text-secondary-container font-label-md text-label-md rounded-lg whitespace-nowrap squish" type="button">
                        获取验证码
                    </button>
</div>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline font-[300]">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low rounded-lg border-transparent focus:border-primary-container focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline transition-colors outline-none" placeholder="密码" type="password"/>
<div class="absolute inset-y-0 right-0 pr-sm flex items-center">
<button class="text-outline hover:text-on-surface-variant focus:outline-none" type="button">
<span class="material-symbols-outlined font-[300]">visibility_off</span>
</button>
</div>
</div>
<div class="mt-lg">
<button class="w-full h-14 bg-gradient-to-r from-primary-container to-[#ff7a91] text-on-primary rounded-lg font-headline-lg text-headline-lg shadow-[0_8px_20px_rgba(255,90,119,0.25)] squish relative overflow-hidden flex items-center justify-center gap-xs" type="submit">
<div class="absolute top-0 left-0 right-0 h-4 bg-white/20 rounded-t-lg blur-[2px]"></div>
                        注册
                        <span class="material-symbols-outlined font-[300] text-xl">pets</span>
</button>
</div>
</form>
<div class="mt-xl flex items-start gap-xs px-base">
<div class="pt-1">
<input class="w-5 h-5 rounded-md border-outline text-primary-container focus:ring-primary-container bg-surface-container-low" id="agreement" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant leading-tight" for="agreement">
                    我已阅读并同意 <a class="text-primary-container font-bold" href="#">用户协议</a> 和 <a class="text-primary-container font-bold" href="#">隐私政策</a>
</label>
</div>
<div class="mt-auto pt-xl flex flex-col items-center gap-sm">
<p class="font-body-md text-body-md text-on-surface-variant">已有账号？</p>
<a class="font-headline-lg text-headline-lg text-primary-container squish inline-block" href="#">立即登录</a>
</div>
</main>
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl translate-x-1/3 -translate-y-1/3 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-72 h-72 bg-secondary-container/5 rounded-full blur-3xl -translate-x-1/3 translate-y-1/3 pointer-events-none"></div>
</div>
</body></html>
