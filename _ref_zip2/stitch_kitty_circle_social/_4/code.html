<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kitty Circle - Login</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#00513f",
                        "surface": "#fbf9f4",
                        "secondary-container": "#fdaf18",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#e1bec0",
                        "primary": "#b52044",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#75f9d1",
                        "on-surface-variant": "#594042",
                        "on-error": "#ffffff",
                        "inverse-primary": "#ffb2b9",
                        "on-primary": "#ffffff",
                        "surface-bright": "#fbf9f4",
                        "on-secondary-fixed-variant": "#614000",
                        "inverse-surface": "#30312e",
                        "secondary-fixed": "#ffddb0",
                        "tertiary-fixed-dim": "#55dcb6",
                        "surface-container-low": "#f5f3ee",
                        "outline": "#8d7072",
                        "on-surface": "#1b1c19",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e2dd",
                        "secondary": "#805600",
                        "on-secondary-fixed": "#281800",
                        "background": "#fbf9f4",
                        "error": "#ba1a1a",
                        "on-background": "#1b1c19",
                        "primary-fixed": "#ffdadc",
                        "surface-variant": "#e4e2dd",
                        "surface-tint": "#b52044",
                        "surface-container-high": "#eae8e3",
                        "on-primary-fixed": "#400010",
                        "surface-container": "#f0eee9",
                        "on-tertiary-container": "#003528",
                        "inverse-on-surface": "#f2f1ec",
                        "secondary-fixed-dim": "#ffba46",
                        "tertiary-container": "#00a986",
                        "on-secondary-container": "#694600",
                        "on-primary-fixed-variant": "#91002f",
                        "on-primary-container": "#62001d",
                        "tertiary": "#006b54",
                        "on-tertiary-fixed": "#002118",
                        "surface-dim": "#dbdad5",
                        "primary-fixed-dim": "#ffb2b9",
                        "primary-container": "#ff5a77",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "sm": "12px",
                        "card-gap": "12px",
                        "base": "4px",
                        "xl": "32px",
                        "lg": "24px",
                        "container-padding": "16px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-xl": ["28px", { "lineHeight": "36px", "fontWeight": "800" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "headline-lg": ["22px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Base styles to ensure consistency */
        body {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Focus styles for inputs */
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #ff5a77; /* primary-container */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-['Plus_Jakarta_Sans']">
<!-- Main Container -->
<main class="flex-1 w-full max-w-md mx-auto px-container-padding flex flex-col pt-12 pb-8 relative z-10 overflow-hidden">
<!-- Decorative Background Blob -->
<div class="absolute top-[-100px] right-[-50px] w-64 h-64 bg-primary-container/10 rounded-full blur-3xl z-[-1]"></div>
<div class="absolute bottom-[200px] left-[-80px] w-72 h-72 bg-secondary-container/10 rounded-full blur-3xl z-[-1]"></div>
<!-- Header / Logo Section -->
<header class="flex flex-col items-center justify-center mt-xl mb-[48px]">
<div class="relative inline-block mb-sm">
<!-- Text Logo representing TopAppBar Brand Anchor without the shell -->
<h1 class="text-[56px] leading-[1] font-black tracking-tighter text-primary-container drop-shadow-sm">MEOW</h1>
<!-- Sparkle Decoration -->
<span class="material-symbols-outlined absolute -top-2 -right-6 text-secondary-container text-2xl" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
</div>
<p class="font-body-lg text-outline">欢迎回到喵圈</p>
</header>
<!-- Login Form Section -->
<section class="flex flex-col gap-md w-full">
<!-- Phone/Email Input -->
<div class="relative group">
<div class="absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[22px]">person</span>
</div>
<input class="w-full bg-surface-container-low rounded-lg h-[64px] pl-[48px] pr-md font-body-lg text-on-surface border-none placeholder:text-outline/60 focus:bg-surface-container-lowest transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]" placeholder="手机号/邮箱" type="text"/>
</div>
<!-- Password Input -->
<div class="relative group">
<div class="absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[22px]">lock</span>
</div>
<input class="w-full bg-surface-container-low rounded-lg h-[64px] pl-[48px] pr-[48px] font-body-lg text-on-surface border-none placeholder:text-outline/60 focus:bg-surface-container-lowest transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]" placeholder="密码" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline/60 hover:text-outline transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-base">
<a class="font-label-md text-primary-container hover:text-primary transition-colors" href="#">忘记密码？</a>
</div>
<!-- Primary Login Button -->
<!-- Soft squishy tactile feel, scale down on active -->
<button class="mt-lg w-full h-[64px] rounded-lg bg-gradient-to-r from-primary-container to-inverse-primary text-on-tertiary font-headline-lg shadow-[0_8px_20px_rgba(255,90,119,0.25)] flex items-center justify-center active:scale-[0.96] transition-all duration-200 ease-out relative overflow-hidden group">
<!-- Inner glow simulation -->
<div class="absolute inset-0 rounded-lg shadow-[inset_0_2px_0_rgba(255,255,255,0.3)] pointer-events-none"></div>
<span class="relative z-10">登录</span>
</button>
</section>
<!-- Alternative Login Divider -->
<div class="mt-[48px] flex flex-col items-center w-full">
<div class="flex items-center w-full gap-sm mb-lg">
<div class="flex-1 h-px bg-surface-variant"></div>
<span class="font-label-md text-outline">或使用以下方式登录</span>
<div class="flex-1 h-px bg-surface-variant"></div>
</div>
<!-- Social Login Icons -->
<!-- Using custom colors for brand recognition while maintaining the squishy button style -->
<div class="flex justify-center gap-xl">
<!-- WeChat -->
<button class="w-[56px] h-[56px] rounded-full bg-surface-container-low text-[#07C160] flex items-center justify-center hover:bg-surface-container active:scale-[0.92] transition-all shadow-sm">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</button>
<!-- QQ (Using pets icon as representation) -->
<button class="w-[56px] h-[56px] rounded-full bg-surface-container-low text-[#12B7F5] flex items-center justify-center hover:bg-surface-container active:scale-[0.92] transition-all shadow-sm">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">pets</span>
</button>
<!-- Apple -->
<button class="w-[56px] h-[56px] rounded-full bg-surface-container-low text-on-surface flex items-center justify-center hover:bg-surface-container active:scale-[0.92] transition-all shadow-sm">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">smartphone</span>
</button>
</div>
</div>
<!-- Footer / Sign Up Link -->
<footer class="mt-auto pt-xl w-full flex justify-center items-center gap-xs">
<span class="font-body-md text-outline">还没有账号？</span>
<a class="font-body-md text-primary-container font-bold hover:underline decoration-2 underline-offset-4" href="#">立即注册</a>
</footer>
</main>
</body></html>
