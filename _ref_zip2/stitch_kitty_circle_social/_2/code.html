<!DOCTYPE html>

<html lang="zh-CN"><head>

        }

                        "tertiary-fixed-dim": "#55dcb6",
                        "on-tertiary-container": "#003528",

                        "primary-fixed": "#ffdadc",

                        "surface-variant": "#e4e2dd",

                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",

                    "spacing": {
                        "xs": "8px",
                        "xl": "32px",
                        "sm": "12px",
                        "card-gap": "12px",
                        "base": "4px",
                        "lg": "24px",
                        "md": "16px",
                        "container-padding": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["22px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-xl": ["28px", { "lineHeight": "36px", "fontWeight": "800" }]

</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-md lg:p-xl relative overflow-hidden font-body-md text-on-surface">
<!-- Ambient Glows for Tactile Depth -->
<div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-primary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30vw] h-[30vw] bg-secondary-container/20 rounded-full blur-[80px] pointer-events-none"></div>
<!-- Main Container: Glass/Card Hybrid -->
<main class="w-full max-w-[1200px] min-h-[700px] bg-surface-container-lowest/80 backdrop-blur-xl rounded-xl shadow-[0_32px_64px_-16px_rgba(255,90,119,0.08)] flex flex-col lg:flex-row overflow-hidden relative z-10 border border-white/50">
<!-- Left Column: Brand Imagery (Hidden on Mobile) -->
<div class="hidden lg:block lg:w-1/2 relative bg-surface-container-low overflow-hidden">
<img alt="illustration of a cat" class="absolute inset-0 w-full h-full object-cover rounded-r-xl lg:rounded-r-none" data-alt="A fluffy white cat lounging luxuriously on a soft pastel pink velvet cushion in a bright sunlit room, highly detailed, vibrant warm lighting, modern aesthetic, joyful dopamine mood" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-FnKTFS5DQ8oAH3iRcvHa5Ngelk3efUNTHDr5w1ek6EXQaeWHZYRoPrpVV_cK59IN2j_Crv2_7xGMyHhy2Vemdjjg3m_hfi1hmlbNFhgaNoiWqBl2VfEtnVpiuyZhOoz84xEbmr88EpQWN-7ceeFoIReM6BR8MexMqiG7VtCitVfN_rIRpibEykCeGn1d3j8DZdRhdlBJ6YVtdP7Pt8pw2nfPVT6XNCD_E58uuqAhqEvt32TEOHBt0d_rFKIf_LUlnzI9AeFc"/>
<!-- Gradient Overlay to blend with form -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-transparent to-surface-container-lowest/90"></div>
<!-- Brand Badge on Image -->
<div class="absolute top-12 left-12 bg-white/30 backdrop-blur-md px-6 py-3 rounded-full border border-white/40 shadow-sm">
<span class="font-headline-lg text-headline-lg text-primary-container tracking-tight">Kitty Circle</span>
</div>
</div>
<!-- Right Column: Login Form -->
<div class="w-full lg:w-1/2 flex flex-col justify-center px-8 py-12 sm:px-16 lg:px-24 bg-surface-container-lowest relative">
<!-- Form Header -->
<div class="text-center mb-10">
<h1 class="font-headline-xl text-headline-xl text-primary-container tracking-tighter mb-2">MEOW</h1>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-1">欢迎回来</h2>
<p class="font-body-md text-body-md text-on-surface-variant">登录以继续您的探索之旅</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-6">
<!-- Input Group: Mobile/Email -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="username">手机号 / 邮箱</label>
<div class="relative flex items-center bg-surface-container rounded-DEFAULT overflow-hidden focus-within:ring-2 focus-within:ring-primary-container transition-all duration-200 group">
<div class="pl-4 pr-2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full bg-transparent border-none py-4 pr-4 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-0" id="username" placeholder="请输入您的账号" type="text"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="flex flex-col gap-2 relative">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">密码</label>
<a class="font-label-md text-label-md text-primary-container hover:underline decoration-primary-container/50 transition-all" href="#">忘记密码？</a>
</div>
<div class="relative flex items-center bg-surface-container rounded-DEFAULT overflow-hidden focus-within:ring-2 focus-within:ring-primary-container transition-all duration-200 group">
<div class="pl-4 pr-2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-transparent border-none py-4 pr-12 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-0" id="password" placeholder="请输入密码" type="password"/>
<button class="absolute right-4 text-on-surface-variant hover:text-primary-container transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action Button -->
<button class="mt-4 w-full relative overflow-hidden bg-gradient-to-b from-[#ff7a91] to-primary-container text-white py-4 rounded-DEFAULT font-headline-lg text-[18px] tracking-wide shadow-[0_8px_24px_-8px_rgba(255,90,119,0.5)] hover:shadow-[0_12px_32px_-8px_rgba(255,90,119,0.6)] active:scale-[0.97] transition-all duration-200 group" type="submit">
<span class="relative z-10">登 录</span>
<!-- Inner soft glow for tactile 'inflated' feel -->
<div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent pointer-events-none rounded-DEFAULT"></div>
</button>
</form>
<!-- Divider -->
<div class="flex items-center w-full my-10 opacity-70">
<div class="flex-1 h-px bg-surface-variant"></div>
<span class="px-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">其他登录方式</span>
<div class="flex-1 h-px bg-surface-variant"></div>
</div>
<!-- Social Login Options -->
<div class="flex justify-center gap-6">
<!-- WeChat -->
<button class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-[#07C160] hover:bg-surface-variant hover:scale-[1.05] active:scale-[0.95] transition-all duration-200 shadow-sm" type="button">
<span class="material-symbols-outlined icon-fill text-[28px]">chat_bubble</span>
</button>
<!-- Weibo/Apple placeholder -->
<button class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-on-surface hover:bg-surface-variant hover:scale-[1.05] active:scale-[0.95] transition-all duration-200 shadow-sm" type="button">
<span class="material-symbols-outlined icon-fill text-[28px]">ios</span>
</button>
<!-- QQ/Mail placeholder -->
<button class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-[#12B7F5] hover:bg-surface-variant hover:scale-[1.05] active:scale-[0.95] transition-all duration-200 shadow-sm" type="button">
<span class="material-symbols-outlined icon-fill text-[28px]">mail</span>
</button>
</div>
<!-- Bottom Legal Text -->
<p class="text-center font-label-md text-[11px] text-on-surface-variant mt-12 opacity-80">
                登录即代表您同意 MEOW 的 <a class="text-primary-container hover:underline" href="#">服务条款</a> 和 <a class="text-primary-container hover:underline" href="#">隐私政策</a>
</p>
</div>
</main>
</body></html>
