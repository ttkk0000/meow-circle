<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#006b54",
                    "on-tertiary-container": "#003528",
                    "surface-container-high": "#eae8e3",
                    "on-secondary-fixed-variant": "#614000",
                    "surface": "#fbf9f4",
                    "on-error": "#ffffff",
                    "primary-container": "#ff5a77",
                    "tertiary-container": "#00a986",
                    "primary-fixed-dim": "#ffb2b9",
                    "on-tertiary-fixed-variant": "#00513f",
                    "on-background": "#1b1c19",
                    "tertiary-fixed-dim": "#55dcb6",
                    "surface-variant": "#e4e2dd",
                    "outline": "#8d7072",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#694600",
                    "on-primary-container": "#62001d",
                    "tertiary-fixed": "#75f9d1",
                    "on-primary-fixed-variant": "#91002f",
                    "inverse-surface": "#30312e",
                    "on-secondary-fixed": "#281800",
                    "inverse-primary": "#ffb2b9",
                    "surface-container": "#f0eee9",
                    "secondary-fixed": "#ffddb0",
                    "background": "#fbf9f4",
                    "secondary": "#805600",
                    "surface-bright": "#fbf9f4",
                    "outline-variant": "#e1bec0",
                    "surface-container-highest": "#e4e2dd",
                    "secondary-fixed-dim": "#ffba46",
                    "on-error-container": "#93000a",
                    "on-surface": "#1b1c19",
                    "on-primary-fixed": "#400010",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#ffdadc",
                    "inverse-on-surface": "#f2f1ec",
                    "surface-tint": "#b52044",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#594042",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#fdaf18",
                    "on-tertiary-fixed": "#002118",
                    "error-container": "#ffdad6",
                    "surface-dim": "#dbdad5",
                    "primary": "#b52044",
                    "surface-container-low": "#f5f3ee",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "md": "16px",
                    "container-padding": "16px",
                    "card-gap": "12px",
                    "lg": "24px",
                    "sm": "12px",
                    "xs": "8px",
                    "base": "4px"
            },
            "fontFamily": {
                    "headline-xl": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-xl": ["28px", {"lineHeight": "36px", "fontWeight": "800"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "headline-lg": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24;
        }
        .animate-bounce-short {
            animation: bounce 0.5s ease-in-out 1;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(0.95); }
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary-fixed">
<!-- TopAppBar -->
<header class="bg-[#F9F7F2]/80 backdrop-blur-xl dark:bg-stone-950/80 font-['Plus_Jakarta_Sans'] font-bold docked full-width top-0 sticky z-50 shadow-[0_4px_20px_rgba(255,90,119,0.05)] flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-2">
<button class="text-stone-400 hover:opacity-80 transition-opacity Active: scale-95 duration-200 transition-transform flex items-center">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="text-2xl font-black tracking-tighter text-[#FF5A77] dark:text-rose-400">MEOW</div>
<button class="bg-primary-container text-on-primary px-5 py-1.5 rounded-full text-label-md font-bold hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-primary-container/20">
            发布
        </button>
</header>
<main class="px-container-padding pt-lg pb-xl space-y-lg">
<!-- Image Upload Grid (Bento Style) -->
<section class="grid grid-cols-3 gap-card-gap h-[280px]">
<div class="col-span-2 row-span-2 relative group overflow-hidden rounded-lg">
<img class="w-full h-full object-cover" data-alt="close up of a fluffy ginger cat with bright green eyes looking curiously at the camera in warm soft indoor lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuArqognZJkTdIU06KkqhpnF4mEYaoBJy588opcrjOAPPlJxfkzqbTA--GQSBKtTel4DrjH3h6aEsY5zVvYw5hiThYzXZ_9B3AqJNphawlxUIj3ZqtL5HdXwTX3Jf9AywfaAUT6s8uMcOjwnvwEfTBESZEEQQaXztXmV36C5Uslc45Eo_mw2wkQ0jPTL3Nhhb1MQZrrC5v8ipN17DukS5uHLh54o_xEUR7M4mMw44uT4L157B4ZEyHZ3PM1-uxFnwWRpvIRu238h"/>
<button class="absolute top-sm right-sm bg-black/30 backdrop-blur-md text-white p-1 rounded-full active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<div class="col-span-1 row-span-1 relative group overflow-hidden rounded-lg">
<img class="w-full h-full object-cover" data-alt="a majestic white cat sitting elegantly on a wooden floor with soft morning sunlight streaming through a window" src="https://lh3.googleusercontent.com/aida-public/AB6AXuALb89sRBvwRioIhNetDmsHV82MLHPa_yyVnjKSDhbb5jJMthLGecQPQLP05g2gF8S3JjD_K_dKk7KSTFGun-S6ZFVzP5sdPvxLYthB8pSrlkzxISG_uPFXsxhdDgSE-0ugfhLPu-rZfGNLAFWoyyBH-C0ldWlBfwZjdY9J4PuEBKZH1v7g3byZBF5mcw6lDvq-HpMn-Ng54UDeF2ywN8dOTihDS7o4-UMOAp7xAzTbkDSW43n11W2ocflURTyKC0VPRDjMlnl7"/>
<button class="absolute top-base right-base bg-black/30 backdrop-blur-md text-white p-1 rounded-full active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
<div class="col-span-1 row-span-1 flex flex-col items-center justify-center border-2 border-dashed border-outline-variant bg-surface-container-lowest rounded-lg hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary text-[32px]">add_circle</span>
<span class="text-label-md mt-base text-outline">添加</span>
</div>
</section>
<!-- Caption Area -->
<section class="bg-surface-container-lowest rounded-lg p-lg shadow-sm">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-body-lg font-body-lg placeholder:text-stone-300 resize-none min-h-[120px]" placeholder="分享你的猫咪瞬间..."></textarea>
<!-- Quick Tags Suggestion -->
<div class="mt-md flex flex-wrap gap-xs">
<div class="px-sm py-xs bg-primary-container/10 text-[#FF5A77] rounded-full text-label-md flex items-center gap-base active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[14px]">tag</span>
                    喵星人
                </div>
<div class="px-sm py-xs bg-primary-container/10 text-[#FF5A77] rounded-full text-label-md flex items-center gap-base active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[14px]">tag</span>
                    新手养猫
                </div>
<div class="px-sm py-xs bg-stone-100 text-stone-500 rounded-full text-label-md flex items-center gap-base active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[14px]">add</span>
                    添加标签
                </div>
</div>
</section>
<!-- Options Section -->
<section class="space-y-sm">
<!-- Location Picker -->
<div class="flex items-center justify-between p-md bg-surface-container-lowest rounded-lg active:scale-[0.98] transition-transform">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-[#fdaf18]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#fdaf18]">location_on</span>
</div>
<div>
<p class="font-headline-lg text-[16px]">添加地点</p>
<p class="text-label-md text-stone-400">分享你所在的位置</p>
</div>
</div>
<span class="material-symbols-outlined text-stone-300">chevron_right</span>
</div>
<!-- Circle Selection -->
<div class="flex items-center justify-between p-md bg-surface-container-lowest rounded-lg active:scale-[0.98] transition-transform">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-[#00a986]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#00a986]">groups</span>
</div>
<div>
<p class="font-headline-lg text-[16px]">发布到圈子</p>
<p class="text-label-md text-[#00a986] font-bold">布偶猫交流群</p>
</div>
</div>
<span class="material-symbols-outlined text-stone-300">chevron_right</span>
</div>
<!-- Visibility Selection -->
<div class="flex items-center justify-between p-md bg-surface-container-lowest rounded-lg active:scale-[0.98] transition-transform">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center">
<span class="material-symbols-outlined text-stone-500">public</span>
</div>
<div>
<p class="font-headline-lg text-[16px]">谁可以看</p>
<p class="text-label-md text-stone-400">公开</p>
</div>
</div>
<span class="material-symbols-outlined text-stone-300">chevron_right</span>
</div>
</section>
<!-- Social Settings -->
<section class="flex items-center justify-between px-md py-sm">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-[20px] text-primary">check_circle</span>
<span class="text-label-md text-stone-500">保存到相册</span>
</div>
<div class="flex gap-md">
<div class="w-8 h-8 rounded-full bg-[#07C160] flex items-center justify-center text-white scale-90 opacity-40">
<span class="material-symbols-outlined text-[18px]">chat_bubble</span>
</div>
<div class="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center text-stone-400 scale-90">
<span class="material-symbols-outlined text-[18px]">share</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Hint -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 w-32 h-1.5 bg-stone-300/30 rounded-full"></div>
</body></html>
